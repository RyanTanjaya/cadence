# Render blueprint for the Cadence API.
# Before first deploy: in server/prisma/schema.prisma set `provider = "postgresql"`
# and point DATABASE_URL at your Supabase Postgres connection string.
services:
  - type: web
    name: cadence-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false # set to your Supabase Postgres URL in the dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set to your Vercel frontend URL
      - key: NODE_ENV
        value: production
