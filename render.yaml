# Render blueprint for the Cadence API.
# DATABASE_URL must be the Supabase Session-pooler connection string (IPv4).
# --include=dev is required because NODE_ENV=production otherwise makes npm skip
# devDependencies (typescript, prisma CLI) that the build needs.
services:
  - type: web
    name: cadence-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma db push
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false # set to your Supabase Postgres URL in the dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set to your Vercel frontend URL
      - key: NODE_ENV
        value: production
